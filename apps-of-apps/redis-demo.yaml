apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mfahad544/gitops-demo.git
    targetRevision: main
    path: charts/redis-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
