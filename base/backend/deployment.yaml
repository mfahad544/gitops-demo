apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: traefik/whoami
          ports:
            - containerPort: 80
          env:
            - name: DB_HOST
              value: postgres
            - name: CACHE_HOST
              value: redis
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
