apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-demo
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: busybox-demo
  template:
    metadata:
      labels:
        app: busybox-demo
    spec:
      containers:
        - name: busybox
          image: busybox:1.36
          command: ["sleep", "3600"]
